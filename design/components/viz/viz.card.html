<!-- @dsCard group="Components" viewport="700x400" subtitle="Manifold, data-driven wireframe" name="Manifold" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css"></head>
<body class="night-mode" style="margin:0;background:var(--canvas);font-family:var(--font-ui);color:var(--text);display:flex;align-items:center;justify-content:center;">
<div style="position:relative;width:620px;height:390px;">
  <canvas id="m" width="1240" height="780" style="width:620px;height:390px;display:block;"></canvas>
  <div id="labels" style="position:absolute;inset:0;pointer-events:none;"></div>
</div>
<script type="module">
  import { drawManifold } from './manifold-core.js';
  const labels = drawManifold(document.getElementById('m'), { W: 620, H: 390, S: 132, dpr: 2, glow: 0.75, grid: 56, lineWidth: 0.7 });
  const wrap = document.getElementById('labels');
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('width', '620'); svg.setAttribute('height', '390');
  svg.style.position = 'absolute'; svg.style.inset = '0';
  for (const l of labels) {
    const dot = document.createElementNS(svgNS, 'circle');
    dot.setAttribute('cx', l.ax); dot.setAttribute('cy', l.ay); dot.setAttribute('r', '2.5'); dot.setAttribute('fill', '#A5A199');
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', l.ax); line.setAttribute('y1', l.ay); line.setAttribute('x2', l.lx); line.setAttribute('y2', l.ly);
    line.setAttribute('stroke', '#6E6B64'); line.setAttribute('stroke-width', '1');
    svg.appendChild(dot); svg.appendChild(line);
    const div = document.createElement('div');
    div.textContent = l.name;
    div.style.cssText = 'position:absolute;left:' + l.lx + 'px;top:' + l.ly + 'px;transform:' + l.tf + ';font-size:12px;color:#A5A199;white-space:nowrap;padding:2px 6px;';
    wrap.appendChild(div);
  }
  wrap.appendChild(svg);
</script>
</body></html>

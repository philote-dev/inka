<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css"></head>
<body class="night-mode" style="margin:0;background:var(--canvas);font-family:var(--font-ui);color:var(--text);padding:20px 24px;display:flex;flex-direction:column;gap:18px;">
<div style="display:flex;align-items:center;gap:12px;">
  <button style="background:var(--action-bg);color:var(--action-fg);border:none;border-radius:10px;padding:12px 20px;font-family:inherit;font-size:14px;font-weight:500;">Start session</button>
  <button style="background:none;color:var(--text);border:1px solid var(--muted);border-radius:10px;padding:11px 18px;font-family:inherit;font-size:14px;font-weight:500;">Show the step</button>
  <button style="background:none;color:var(--muted);border:none;border-radius:10px;padding:11px 12px;font-family:inherit;font-size:14px;font-weight:500;">See what is missing</button>
  <button style="background:var(--action-bg);color:var(--action-fg);border:none;border-radius:10px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:500;">Commit</button>
  <button style="background:var(--action-bg);color:var(--action-fg);border:none;border-radius:10px;padding:12px 20px;font-family:inherit;font-size:14px;font-weight:500;opacity:0.5;">Disabled</button>
</div>
<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
  <span style="display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:500;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:4px 12px;">Mechanics</span>
  <span style="display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:500;color:var(--memory-text);border:1px solid rgba(235,203,139,0.35);border-radius:999px;padding:4px 12px;"><span style="width:6px;height:6px;border-radius:999px;background:currentColor"></span>Electromagnetism</span>
  <span style="display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:500;color:var(--performance-text);border:1px solid rgba(129,161,193,0.45);border-radius:999px;padding:4px 12px;"><span style="width:6px;height:6px;border-radius:999px;background:currentColor"></span>Problems</span>
  <span style="display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:500;color:var(--readiness-text);border:1px solid rgba(196,167,214,0.45);border-radius:999px;padding:4px 12px;"><span style="width:6px;height:6px;border-radius:999px;background:currentColor"></span>Readiness</span>
  <span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--success);border:1px solid rgba(163,190,140,0.4);border-radius:999px;padding:3px 10px;">Verified</span>
  <span style="display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--caution);border:1px solid rgba(208,135,112,0.4);border-radius:999px;padding:3px 10px;">Needs review</span>
</div>
</body></html>

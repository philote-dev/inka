<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css"></head>
<body class="night-mode" style="margin:0;background:var(--canvas);font-family:var(--font-ui);color:var(--text);padding:20px;display:flex;gap:16px;">
<section style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow-card);">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#EBCB8B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,10 10,6.5 17,10"/><polyline points="3,13.5 10,10 17,13.5"/><polygon points="10,3 14,5.2 10,7.4 6,5.2"/></svg>
      <span style="font-size:13px;font-weight:500;color:var(--muted);">Memory</span>
    </div>
    <svg width="62" height="22" viewBox="0 0 62 22" fill="none"><polyline points="0,16 10,13 20,14 31,10 41,11.5 51,7.5 62,8.5" stroke="#EBCB8B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/></svg>
  </div>
  <div style="font-family:var(--font-mono);font-size:40px;font-weight:500;line-height:1;font-variant-numeric:tabular-nums;">72</div>
  <div style="font-family:var(--font-mono);font-size:13px;color:var(--muted);margin-top:8px;">Likely 68 to 77</div>
  <div style="display:flex;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
    <span style="font-size:11px;font-weight:500;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);">Fairly sure</span>
    <span style="font-size:12px;color:var(--muted);">Updated 2h ago</span>
  </div>
</section>
<section style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:var(--shadow-card);">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#C4A7D6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 13.5 a6.5 6.5 0 0 1 13 0"/><line x1="10" y1="13.5" x2="13.5" y2="8.5"/><circle cx="10" cy="13.5" r="1" fill="#C4A7D6" stroke="none"/></svg>
    <span style="font-size:13px;font-weight:500;color:var(--muted);">Readiness</span>
  </div>
  <div style="font-size:16px;font-weight:600;">Not enough evidence yet</div>
  <p style="margin:8px 0 0;font-size:13px;line-height:1.5;color:var(--muted);">Coverage sits at 46 percent, below the 70 percent line. Readiness stays quiet until then.</p>
  <a href="#" style="display:inline-block;margin-top:12px;font-size:13px;color:var(--text);text-decoration:underline;text-underline-offset:3px;">See what is missing</a>
</section>
</body></html>

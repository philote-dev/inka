<!-- @dsCard group="Voice" viewport="700x210" subtitle="Honest instrument, lightly human" name="Copy rules" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body class="night-mode" style="margin:0;background:var(--canvas);font-family:var(--font-ui);color:var(--text);padding:20px 24px;display:flex;gap:24px;">
<div style="flex:1;display:flex;flex-direction:column;gap:8px;">
  <div style="font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#A3BE8C;">Yes</div>
  <div style="font-size:13px;line-height:1.5;">Likely 68 to 77</div>
  <div style="font-size:13px;line-height:1.5;">Your answer, not correct</div>
  <div style="font-size:13px;line-height:1.5;">Help unlocks after you commit.</div>
  <div style="font-size:13px;line-height:1.5;">Working it out yourself is the point.</div>
  <div style="font-size:13px;line-height:1.5;">Not enough evidence yet</div>
</div>
<div style="flex:1;display:flex;flex-direction:column;gap:8px;">
  <div style="font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#D08770;">No</div>
  <div style="font-size:13px;line-height:1.5;color:var(--muted);">Great job!! 🎉</div>
  <div style="font-size:13px;line-height:1.5;color:var(--muted);">Wrong — try again</div>
  <div style="font-size:13px;line-height:1.5;color:var(--muted);">Score: 72</div>
  <div style="font-size:13px;line-height:1.5;color:var(--muted);">You failed this topic</div>
  <div style="font-size:11px;color:var(--muted);margin-top:6px;">No em-dashes, no colon-heavy phrasing, no emoji, never flatter, never punish.</div>
</div>
</body></html>

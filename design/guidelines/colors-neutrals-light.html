<!-- @dsCard group="Colors" viewport="700x160" subtitle="Light neutrals, warm off-white" name="Neutrals light" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;background:var(--canvas);font-family:var(--font-ui);color:var(--text);padding:20px;display:flex;gap:12px;">
<div style="flex:1"><div style="height:56px;border-radius:10px;background:#FBFAF8;border:1px solid var(--border)"></div><div style="font-size:12px;margin-top:6px;">canvas</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#FBFAF8</div></div>
<div style="flex:1"><div style="height:56px;border-radius:10px;background:#FFFFFF;border:1px solid var(--border)"></div><div style="font-size:12px;margin-top:6px;">surface</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#FFFFFF</div></div>
<div style="flex:1"><div style="height:56px;border-radius:10px;background:#F5F2EC;border:1px solid var(--border)"></div><div style="font-size:12px;margin-top:6px;">elevated</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#F5F2EC</div></div>
<div style="flex:1"><div style="height:56px;border-radius:10px;background:#E8E4DA"></div><div style="font-size:12px;margin-top:6px;">border</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#E8E4DA</div></div>
<div style="flex:1"><div style="height:56px;border-radius:10px;background:#262624"></div><div style="font-size:12px;margin-top:6px;">text</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#262624</div></div>
<div style="flex:1"><div style="height:56px;border-radius:10px;background:#6E6B64"></div><div style="font-size:12px;margin-top:6px;">muted</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#6E6B64</div></div>
</body></html>

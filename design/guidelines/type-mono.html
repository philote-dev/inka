<!-- @dsCard group="Type" viewport="700x190" subtitle="JetBrains Mono, tabular figures, numbers never jitter" name="Data type" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body class="night-mode" style="margin:0;background:var(--canvas);font-family:var(--font-mono);color:var(--text);padding:20px 24px;display:flex;align-items:flex-end;gap:32px;">
<div><div style="font-size:40px;font-weight:500;line-height:1;font-variant-numeric:tabular-nums;">72</div><div style="font-family:var(--font-ui);font-size:11px;color:var(--muted);margin-top:8px;">score 40/500</div></div>
<div><div style="font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;">Likely 68 to 77</div><div style="font-family:var(--font-ui);font-size:11px;color:var(--muted);margin-top:8px;">range 13</div></div>
<div><div style="font-size:13px;font-variant-numeric:tabular-nums;">7 / 20</div><div style="font-family:var(--font-ui);font-size:11px;color:var(--muted);margin-top:8px;">progress 13</div></div>
<div><div style="font-size:13px;font-variant-numeric:tabular-nums;">01:42:16</div><div style="font-family:var(--font-ui);font-size:11px;color:var(--muted);margin-top:8px;">timer 13</div></div>
<div style="font-family:var(--font-ui);font-size:11px;color:var(--muted);max-width:160px;line-height:1.5;">Every number everywhere sets font-variant-numeric tabular-nums.</div>
</body></html>

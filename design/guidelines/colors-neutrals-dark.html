<!-- @dsCard group="Colors" viewport="700x160" subtitle="Dark neutrals, warm grey not black" name="Neutrals dark" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body class="night-mode" style="margin:0;background:var(--canvas);font-family:var(--font-ui);color:var(--text);padding:20px;display:flex;gap:12px;">
<div style="flex:1"><div style="height:56px;border-radius:10px;background:#262624;border:1px solid var(--border)"></div><div style="font-size:12px;margin-top:6px;">canvas</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#262624</div></div>
<div style="flex:1"><div style="height:56px;border-radius:10px;background:#302F2C;border:1px solid var(--border)"></div><div style="font-size:12px;margin-top:6px;">surface</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#302F2C</div></div>
<div style="flex:1"><div style="height:56px;border-radius:10px;background:#3A3835;border:1px solid var(--border)"></div><div style="font-size:12px;margin-top:6px;">elevated</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#3A3835</div></div>
<div style="flex:1"><div style="height:56px;border-radius:10px;background:#45433E"></div><div style="font-size:12px;margin-top:6px;">border</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#45433E</div></div>
<div style="flex:1"><div style="height:56px;border-radius:10px;background:#ECEAE3"></div><div style="font-size:12px;margin-top:6px;">text</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#ECEAE3</div></div>
<div style="flex:1"><div style="height:56px;border-radius:10px;background:#A5A199"></div><div style="font-size:12px;margin-top:6px;">muted</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#A5A199</div></div>
</body></html>

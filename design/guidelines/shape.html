<!-- @dsCard group="Layout" viewport="700x190" subtitle="Squircle radii, hairline borders, soft shadows" name="Shape" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body class="night-mode" style="margin:0;background:var(--canvas);font-family:var(--font-ui);color:var(--text);padding:20px 24px;display:flex;gap:16px;align-items:center;">
<div style="width:110px;height:96px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;"><span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">10 control</span></div>
<div style="width:110px;height:96px;background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;"><span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">12 row</span></div>
<div style="width:110px;height:96px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-card);display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;"><span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">16 card</span></div>
<div style="width:110px;height:96px;background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow-card);display:flex;align-items:flex-end;padding:10px;box-sizing:border-box;"><span style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">20 frame</span></div>
<div style="display:flex;flex-direction:column;gap:8px;">
<span style="align-self:flex-start;font-size:12px;font-weight:500;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:4px 12px;">pill chip</span>
<span style="font-size:11px;color:var(--muted);max-width:150px;line-height:1.5;">1px hairline plus a very soft shadow. Never heavy strokes.</span>
</div>
</body></html>

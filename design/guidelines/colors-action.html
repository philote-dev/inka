<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="margin:0;font-family:var(--font-ui);display:flex;">
<div style="flex:1;background:#FBFAF8;color:#262624;padding:24px;display:flex;align-items:center;gap:12px;">
  <button style="background:#262624;color:#FBFAF8;border:none;border-radius:10px;padding:11px 20px;font-family:inherit;font-size:14px;font-weight:500;">Start session</button>
  <button style="background:none;color:#262624;border:1px solid #6E6B64;border-radius:10px;padding:10px 18px;font-family:inherit;font-size:14px;font-weight:500;">Show the step</button>
</div>
<div style="flex:1;background:#262624;color:#ECEAE3;padding:24px;display:flex;align-items:center;gap:12px;">
  <button style="background:#ECEAE3;color:#262624;border:none;border-radius:10px;padding:11px 20px;font-family:inherit;font-size:14px;font-weight:500;">Start session</button>
  <button style="background:none;color:#ECEAE3;border:1px solid #6E6B64;border-radius:10px;padding:10px 18px;font-family:inherit;font-size:14px;font-weight:500;">Show the step</button>
</div>
</body></html>

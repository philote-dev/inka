<!-- @dsCard group="Layout" viewport="700x180" subtitle="8pt grid" name="Spacing" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body class="night-mode" style="margin:0;background:var(--canvas);font-family:var(--font-ui);color:var(--text);padding:20px 24px;display:flex;align-items:flex-end;gap:20px;">
<div><div style="width:4px;height:4px;background:var(--muted);border-radius:2px;"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:8px;">4</div></div>
<div><div style="width:8px;height:8px;background:var(--muted);border-radius:2px;"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:8px;">8</div></div>
<div><div style="width:16px;height:16px;background:var(--muted);border-radius:3px;"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:8px;">16</div></div>
<div><div style="width:24px;height:24px;background:var(--muted);border-radius:4px;"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:8px;">24</div></div>
<div><div style="width:32px;height:32px;background:var(--muted);border-radius:5px;"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:8px;">32</div></div>
<div><div style="width:40px;height:40px;background:var(--muted);border-radius:6px;"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:8px;">40</div></div>
<div><div style="width:48px;height:48px;background:var(--muted);border-radius:7px;"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:8px;">48</div></div>
<div style="font-size:11px;color:var(--muted);max-width:200px;line-height:1.5;padding-bottom:2px;">Generous negative space. One primary action per screen.</div>
</body></html>

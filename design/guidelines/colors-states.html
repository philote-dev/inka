<!-- @dsCard group="Colors" viewport="700x150" subtitle="States, separate from the score language" name="State colors" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body class="night-mode" style="margin:0;background:var(--canvas);font-family:var(--font-ui);color:var(--text);padding:20px;display:flex;gap:12px;align-items:flex-start;">
<div style="flex:1"><div style="height:44px;border-radius:10px;background:#A3BE8C"></div><div style="font-size:12px;margin-top:6px;">success</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#A3BE8C</div></div>
<div style="flex:1"><div style="height:44px;border-radius:10px;background:#D08770"></div><div style="font-size:12px;margin-top:6px;">caution</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#D08770</div></div>
<div style="flex:1"><div style="height:44px;border-radius:10px;background:#BF616A"></div><div style="font-size:12px;margin-top:6px;">error</div><div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">#BF616A</div></div>
<div style="flex:2;display:flex;flex-direction:column;gap:8px;padding-left:8px;">
  <span style="align-self:flex-start;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:#A3BE8C;border:1px solid rgba(163,190,140,0.4);border-radius:999px;padding:3px 10px;">Verified</span>
  <span style="align-self:flex-start;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:#D08770;border:1px solid rgba(208,135,112,0.4);border-radius:999px;padding:3px 10px;">Needs review</span>
  <span style="font-size:11px;color:var(--muted)">Wrong answers never use error red during learning.</span>
</div>
</body></html>

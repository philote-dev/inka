<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body class="night-mode" style="margin:0;background:var(--canvas);font-family:var(--font-ui);color:var(--text);padding:20px 24px;display:flex;align-items:center;gap:28px;">
<svg width="140" height="100" viewBox="0 0 140 100">
  <line x1="10" y1="90" x2="130" y2="90" stroke="#45433E" stroke-width="1"/>
  <line x1="10" y1="90" x2="10" y2="10" stroke="#45433E" stroke-width="1"/>
  <path d="M10 90 C 48.4 3.6, 10 10, 130 10" fill="none" stroke="#ECEAE3" stroke-width="1.5"/>
  <text x="66" y="102" font-family="JetBrains Mono, monospace" font-size="9" fill="#A5A199" text-anchor="middle">240ms</text>
</svg>
<div style="display:flex;flex-direction:column;gap:6px;">
  <div style="font-family:var(--font-mono);font-size:12px;">cubic-bezier(0.32, 0.72, 0, 1)</div>
  <div style="font-size:11px;color:var(--muted);max-width:300px;line-height:1.6;">Confident, not bouncy. Hover lightens a border or washes a surface. The manifold morphs smoothly as stats change. Nothing freezes the screen for more than 100ms.</div>

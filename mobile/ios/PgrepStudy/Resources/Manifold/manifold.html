<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      #stage {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;

  <body>
    <div id="stage"></div>
    <script src="manifold.bundle.js"></script>

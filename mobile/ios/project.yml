#
# XcodeGen spec for the PGRE study app. Regenerate the .xcodeproj with:
#   brew install xcodegen        # once
#   cd mobile/ios && xcodegen generate
# The generated PgrepStudy.xcodeproj is gitignored (see mobile/ios/.gitignore);
# project.yml is the source of truth. The app links the shared engine via
# ../../out/ios/AnkiFfi.xcframework (a build artifact under the gitignored out/,
# produced by tools/build-xcframework.sh).

name: PgrepStudy

options:
  bundleIdPrefix: net.ankiweb.pgrep
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf
    from: "1.38.1"

targets:
  PgrepStudy:
    type: application
    platform: iOS
    sources:
      - path: PgrepStudy
        excludes:
          - "Resources/**"
      # The bundled 3D manifold renderer (manifold.html + manifold.bundle.js,
      # produced by tools/build-manifold-webview.sh) shipped as app resources.
      - path: PgrepStudy/Resources
        buildPhase: resources
      - path: ../sample-deck/collection.anki2
        buildPhase: resources
    dependencies:
      - package: SwiftProtobuf
      - framework: ../../out/ios/AnkiFfi.xcframework
        embed: false
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: WebKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.ankiweb.pgrep.PgrepStudy
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        # Shown app name under the icon (bundle id and target name stay put).
        INFOPLIST_KEY_CFBundleDisplayName: pgrep
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        # Rust std / getrandom (SecRandomCopyBytes) and reqwest need these.
        OTHER_LDFLAGS: ["-lc++", "-liconv"]
        # Signing. Simulator builds stay unsigned so `just ios-smoke` /
        # `ios-run` need no Apple account and no team. Device builds sign
        # automatically with the developer's Personal Team. DEVELOPMENT_TEAM is
        # your 10-char Team ID (Xcode > Settings > Accounts, or
        # `security find-identity -v -p codesigning` -> the cert's OU); it is
        # ignored for Simulator builds. Free/Personal Team device profiles
        # expire after 7 days, so re-run from Xcode weekly to refresh.
        "CODE_SIGNING_ALLOWED[sdk=iphonesimulator*]": NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: S4JPGVH2H5
    scheme:
      testTargets:
        - PgrepStudyTests
      gatherCoverageData: false

  # Standalone (host-less) logic-test bundle: it compiles the engine bridge and
  # generated protos directly and links the shared xcframework, so it proves the
  # engine on-Simulator without depending on the SwiftUI app target.
  PgrepStudyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PgrepStudyTests
      - path: PgrepStudy/AnkiBackend.swift
      - path: PgrepStudy/AttemptWriter.swift
      - path: PgrepStudy/SyncRpc.swift
      - path: PgrepStudy/StudySandbox.swift
      # The math renderer's document builder, exercised by MathTextTests to prove
      # the offline (bundled MathJax, no CDN) references without a full app host.
      - path: PgrepStudy/MathText.swift
      # Pure logic for the shared MCQ list and reliability diagram, exercised by
      # ChoiceListTests / ReliabilityDiagramTests. The SwiftUI views that draw
      # them (ChoiceListView, ReliabilityDiagramView) stay in the app target only.
      - path: PgrepStudy/ChoiceList.swift
      - path: PgrepStudy/ReliabilityDiagram.swift
      # Pure interleave + commit grading for the interleaved study session,
      # exercised by StudySessionTests. The model/view (StudySessionView) that
      # drives it against the Engine stays in the app target only.
      - path: PgrepStudy/StudySession.swift
      # Pure end-of-session synthesis derivation (score, topic bars, patterns),
      # exercised by SessionSynthesisTests. The SwiftUI screen that renders it
      # (SessionSynthesisView) stays in the app target only.
      - path: PgrepStudy/SessionSynthesis.swift
      # Pure parse + variant selection + MCQ grading for the gated decomposition
      # tutor, exercised by DecompositionTutorTests. Engine.loadTutor (reads the
      # note) and SubproblemCardView (draws a step) stay in the app target only.
      - path: PgrepStudy/DecompositionTutor.swift
      # Pure placement logic for the on-device Diagnostic, exercised by
      # DiagnosticTests. It folds over the Blueprint table defined in
      # MemoryScore.swift, so that pure file (Foundation-only) joins the bundle
      # too; the SwiftUI DiagnosticView that drives it stays in the app target.
      - path: PgrepStudy/MemoryScore.swift
      - path: PgrepStudy/Diagnostic.swift
      - path: PgrepStudy/Generated
      - path: ../sample-deck/collection.anki2
        buildPhase: resources
    dependencies:
      - package: SwiftProtobuf
      - framework: ../../out/ios/AnkiFfi.xcframework
        embed: false
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: WebKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.ankiweb.pgrep.PgrepStudyTests
        GENERATE_INFOPLIST_FILE: YES
        # Rust std / getrandom (SecRandomCopyBytes) and reqwest need these.
        OTHER_LDFLAGS: ["-lc++", "-liconv"]
        CODE_SIGNING_ALLOWED: NO
    # A dedicated scheme so the engine smoke can be run without building the
    # SwiftUI app: xcodebuild ... -scheme PgrepStudyTests test
    scheme:
      testTargets:
        - PgrepStudyTests
      gatherCoverageData: false
